<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookStore</title>
    <link rel="stylesheet" href="/css/styles.css">
<script src="/js/app.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <div class="header-content">
                <h1>📚 BookStore</h1>
                <div id="user-info">
                    <span id="user-name">Гость</span>
                    <button id="auth-btn" onclick="toggleAuth()">Войти</button>
                </div>
            </div>
        </header>
        
        <main>
            <div id="auth-modal" class="modal hidden">
                <div class="modal-content">
                    <span class="close" onclick="closeModal()">&times;</span>
                    <h2>Авторизация</h2>
                    <form id="login-form" onsubmit="login(event)">
                        <input type="text" id="login-input" placeholder="Логин" required>
                        <input type="password" id="password-input" placeholder="Пароль" required>
                        <div class="guest-option">
                            <input type="checkbox" id="guest-mode" onchange="toggleGuestMode()">
                            <label for="guest-mode">Войти как гость</label>
                        </div>
                        <button type="submit">Войти</button>
                    </form>
                </div>
            </div>
            
            <div id="catalog">
                <div id="controls" class="controls">
                    <input type="text" id="search-input" placeholder="Поиск книг..." oninput="loadBooks()">
                    <select id="genre-filter" onchange="loadBooks()">
                        <option value="">Все жанры</option>
                    </select>
                    <label>
                        <input type="checkbox" id="stock-filter" onchange="loadBooks()">
                        Только в наличии
                    </label>
                    <select id="sort-select" onchange="loadBooks()">
                        <option value="">Без сортировки</option>
                        <option value="publication_date">По дате издания (новые)</option>
                        <option value="publication_date_asc">По дате издания (старые)</option>
                    </select>
                </div>
                
                <div id="books-grid" class="books-grid"></div>
            </div>
            
            <div id="admin-panel" class="hidden">
                <button onclick="showAddBookForm()">Добавить книгу</button>
                <div id="add-book-form" class="hidden">
                    <h3>Добавить книгу</h3>
                    <form id="book-form" onsubmit="addBook(event)">
                        <input type="text" id="book-title" placeholder="Название" required>
                        <input type="text" id="book-author" placeholder="Автор" required>
                        <input type="text" id="book-publisher" placeholder="Издательство" required>
                        <input type="number" id="book-price" placeholder="Цена" step="0.01" required>
                        <input type="number" id="book-stock" placeholder="Количество" required>
                        <input type="date" id="book-date" required>
                        <input type="text" id="book-genres" placeholder="Жанры (через запятую)">
                        <input type="file" id="book-image" accept="image/*">
                        <button type="submit">Сохранить</button>
                    </form>
                </div>
            </div>
            
            <div id="orders-panel" class="hidden">
                <h2>Управление заказами</h2>
                <div id="orders-list"></div>
            </div>
        </main>
    </div>
    
    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/books.js"></script>
    <script src="/js/orders.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
